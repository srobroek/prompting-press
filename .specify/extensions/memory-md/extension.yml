schema_version: "1.0"

extension:
  id: "memory-md"
  name: "Spec Kit Memory MD"
  version: "0.9.7"
  description: "Spec Kit extension for repository-native Markdown memory that captures durable decisions, bugs, and project context."
  author: "DyanGalih"
  repository: "https://github.com/DyanGalih/spec-kit-memory-hub"
  license: "MIT"

requires:
  speckit_version: ">=0.2.0"

hooks:
  before_specify:
    command: "speckit.memory-md.specify"
    optional: false
    prompt: "Would you like to prepare memory context before writing this spec?"
  before_plan:
    command: "speckit.memory-md.plan-with-memory"
    optional: false
    prompt: "Would you like to synthesize project memory before planning?"
  after_implement:
    command: "speckit.memory-md.capture"
    optional: false
    prompt: "Would you like to capture durable lessons from this feature into project memory?"

provides:
  commands:
    - name: "speckit.memory-md.init"
      file: commands/speckit.memory-md.init.md
      description: "Initialize layered memory, synthesis, and spec starter files in a target repo."
    - name: "speckit.memory-md.specify"
      file: commands/speckit.memory-md.specify.md
      description: "Prepare memory context before writing or revising a feature spec. Reads governance layer, index, and prior synthesis, then refreshes feature memory and memory-synthesis.md."
    - name: "speckit.memory-md.plan-with-memory"
      file: commands/speckit.memory-md.plan-with-memory.md
      description: "Use index-first retrieval to synthesize constraints and gate planning on conflicts."
    - name: "speckit.memory-md.capture"
      file: commands/speckit.memory-md.capture.md
      description: "Propose human-approved durable lessons and matching index updates from completed work."
    - name: "speckit.memory-md.capture-from-diff"
      file: commands/speckit.memory-md.capture-from-diff.md
      description: "Review code diffs and propose human-approved durable lessons plus index updates."
    - name: "speckit.memory-md.audit"
      file: commands/speckit.memory-md.audit.md
      description: "Audit memory quality, index integrity, freshness, and synthesis hygiene."
    - name: "speckit.memory-md.repair-index"
      file: commands/speckit.memory-md.repair-index.md
      description: "Recover missing INDEX.md routing rows from durable memory files without deleting existing rows."
    - name: "speckit.memory-md.log-finding"
      file: commands/speckit.memory-md.log-finding.md
      description: "Turn a high-signal audit finding into a tracker-ready follow-up for GitHub, GitLab, Jira, or another issue system."
    - name: "speckit.memory-md.token-report"
      file: commands/speckit.memory-md.token-report.md
      description: "Compare estimated token usage between full memory reads and optimized synthesis."
    - name: "speckit.memory-md.prepare-context"
      file: commands/speckit.memory-md.prepare-context.md
      description: "Centralized context preparation: refresh cache, search memory, and refresh synthesis for a feature. Automatically executed by Architecture Guard governed workflows."
    - name: "speckit.memory-md.index-docs"
      file: commands/speckit.memory-md.index-docs.md
      description: "Index development docs (specs, plans, tasks, constitutions) into SQLite for low-token retrieval through MCP cache tools."
    - name: "speckit.memory-md.init-project"
      file: commands/speckit.memory-md.init-project.md
      description: "Profile and configure project technical stack for cross-project shared memory sync channels."
    - name: "speckit.memory-md.share-lesson"
      file: commands/speckit.memory-md.share-lesson.md
      description: "Promote an approved local technical/architectural lesson from docs/memory into the global shared memory."
    - name: "speckit.memory-md.sync-shared"
      file: commands/speckit.memory-md.sync-shared.md
      description: "Sync matching framework/language specific lessons from global shared memory into a local review buffer."

  agent_templates:
    - file: templates/AGENTS.md
      description: "Generic agent instructions (OpenAI Codex-compatible via AGENTS.md convention)."
    - file: templates/CODEX.md
      description: "OpenAI Codex-specific agent instructions."
    - file: templates/CLAUDE.md
      description: "Claude Code agent instructions."
    - file: templates/GEMINI.md
      description: "Gemini CLI agent instructions."
    - file: templates/WINDSURF.md
      description: "Windsurf agent instructions."
    - file: templates/ANTIGRAVITY.md
      description: "Antigravity-compatible agent instructions."

tags:
  - "memory"
  - "markdown"
  - "ai-context"
  - "spec-kit"
  - "governance"
