# moon.yml for the `ci` project — workspace-level CI gate tasks.
#
# These tasks enforce structural invariants from the constitution and are
# intentionally language-agnostic (no Rust/Python/Node toolchain needed for the
# checks themselves). They are the authoritative locally-runnable gates that the
# GitHub Actions workflow calls via `mise exec -- moon run ...`.
#
# Do not inherit the global all.yml tasks (cargo build/test are wrong here).
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'unknown'

# Exclude the global all.yml tasks (cargo build/test are Rust-only and break the
# `:build`/`:test` fan-out on this non-crate project — F-001).
workspace:
  inheritedTasks:
    exclude: ['build', 'test']

tasks:
  check-ffi:
    description: 'T028 — Assert pyo3/napi are absent from FFI-free crates (FR-018, FR-020; Principle II / C-02).'
    command: 'bash scripts/ci/check-ffi-isolation.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-floating-versions:
    description: 'T030a — Lint manifests for floating version specifiers (^, ~, latest, *) per SEC-003.'
    command: 'bash scripts/ci/check-floating-versions.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-advisories:
    description: 'T036 — Scan workspace deps for known CVEs via cargo-deny + RustSec advisory DB (SEC-001). Gate owner also owns minijinja stable-API re-check on each bump (roadmap Q3).'
    command: 'bash scripts/ci/check-advisories.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-advisories-py:
    description: 'T028 — Scan Python deps locked in packages/python/uv.lock for known CVEs via pip-audit + OSV advisory DB (FR-025, SC-011, SEC-101). Mirrors ci:check-advisories for the Python side.'
    command: 'bash scripts/ci/check-advisories-py.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  test-python:
    description: 'Spec 004 (review I1) — build the prompting-press-py extension and run cargo test -p prompting-press-py + pytest packages/python/tests. Gates the Python-observable guarantees (validate-in-Python, SEC-004-PY scrub, loader parity) that cargo build --workspace does not exercise.'
    command: 'bash scripts/ci/test-python.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false
