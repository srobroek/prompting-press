# moon.yml for the `ci` project — workspace-level CI gate tasks.
#
# These tasks enforce structural invariants from the constitution and are
# intentionally language-agnostic (no Rust/Python/Node toolchain needed for the
# checks themselves). They are the authoritative locally-runnable gates that the
# GitHub Actions workflow calls via `mise exec -- moon run ...`.
#
# Do not inherit the global all.yml tasks (cargo build/test are wrong here).
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'unknown'

# Exclude the global all.yml tasks (cargo build/test are Rust-only and break the
# `:build`/`:test` fan-out on this non-crate project — F-001).
workspace:
  inheritedTasks:
    exclude: ['build', 'test']

tasks:
  check-ffi:
    description: 'T028 — Assert pyo3/napi are absent from FFI-free crates (FR-018, FR-020; Principle II / C-02).'
    command: 'bash scripts/ci/check-ffi-isolation.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-workflows:
    description: 'Static-lint .github/workflows/*.yml with actionlint (syntax, ${{ }} expression errors, shellcheck on run: blocks, action-input typos). Catches a release.yml/ci.yml mistake pre-merge instead of on release day. actionlint is mise-pinned (aqua:rhysd/actionlint).'
    command: 'actionlint'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-floating-versions:
    description: 'T030a — Lint manifests for floating version specifiers (^, ~, latest, *) per SEC-003.'
    command: 'bash scripts/ci/check-floating-versions.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-advisories:
    description: 'T036 — Scan workspace deps for known CVEs via cargo-deny + RustSec advisory DB (SEC-001). Gate owner also owns minijinja stable-API re-check on each bump (roadmap Q3).'
    command: 'bash scripts/ci/check-advisories.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-advisories-py:
    description: 'T028 — Scan Python deps locked in packages/python/uv.lock for known CVEs via pip-audit + OSV advisory DB (FR-025, SC-011, SEC-101). Mirrors ci:check-advisories for the Python side.'
    command: 'bash scripts/ci/check-advisories-py.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  test-python:
    description: 'Spec 004 (review I1) — build the prompting-press-py extension and run cargo test -p prompting-press-py + pytest packages/python/tests. Gates the Python-observable guarantees (validate-in-Python, SEC-004-PY scrub, loader parity) that cargo build --workspace does not exercise.'
    command: 'bash scripts/ci/test-python.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-advisories-node:
    description: 'T029 — Scan Node deps locked in packages/typescript/pnpm-lock.yaml for known CVEs via pnpm audit (FR-025, SC-011, SEC-201). Mirrors ci:check-advisories (Rust) + ci:check-advisories-py (Python).'
    command: 'bash scripts/ci/check-advisories-node.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  test-node:
    description: 'Spec 005 (review I1 lesson) — build the prompting-press-node addon + the TS facade and run cargo test -p prompting-press-node + pnpm -C packages/typescript test. Gates the TS-observable guarantees (Zod validate-at-render, the napi-error->Error-subclass decoder, loader parity, composition) that cargo build --workspace does not exercise.'
    command: 'bash scripts/ci/test-node.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  conformance:
    description: 'Spec 006 (FR-012 / FR-015) — build both FFI bindings and run all three conformance legs: (1) cargo test -p prompting-press --test conformance_marshaling --test conformance_schema (the unique CI value — closes the gap where the OS-matrix build never ran Rust consumer tests); (2) pytest on the two Python conformance files; (3) node --test on the two TS conformance files. A single self-contained, locally-reproducible gate for FFI marshaling parity and schema round-trip across all three bindings.'
    command: 'bash scripts/ci/conformance.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  # -------------------------------------------------------------------------
  # License-policy gates (Apache-2.0 release compatibility). One per ecosystem,
  # mirroring the check-advisories trio. All are CHEAP (no build) → PR gate.
  # -------------------------------------------------------------------------
  check-licenses:
    description: 'License gate (Rust) — cargo deny check licenses asserts every shipped crate + transitive dep is Apache-2.0-compatible (deny.toml [licenses] allow-list). No build, no network.'
    command: 'bash scripts/ci/check-licenses.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-licenses-py:
    description: 'License gate (Python) — pip-licenses asserts the wheel runtime deps (pydantic chain, uv.lock, --no-dev) are Apache-2.0-compatible. Mirrors ci:check-licenses.'
    command: 'bash scripts/ci/check-licenses-py.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-licenses-node:
    description: 'License gate (Node) — offline package.json scan asserts every installed npm package is Apache-2.0-compatible. Mirrors ci:check-licenses.'
    command: 'bash scripts/ci/check-licenses-node.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-third-party-licenses:
    description: 'Third-party attribution freshness gate — regenerates the bundled packages/*/THIRD-PARTY-LICENSES.md via cargo-about and fails if git diff is dirty (the wheel + .node addon statically link the Rust graph, so their notices must be shipped and current).'
    command: 'bash scripts/ci/check-third-party-licenses.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  # -------------------------------------------------------------------------
  # Lint / format gates. All CHEAP (static analysis, no compile) → PR gate.
  # One per ecosystem: Rust (rustfmt), Python (ruff). The Node/TS biome gate is
  # the pre-existing `prompting-press-typescript:lint` moon task (pnpm biome
  # check), which the pr-gate job also runs.
  # -------------------------------------------------------------------------
  check-fmt:
    description: 'Rust formatting gate — `cargo fmt --all --check`. Pure static check, no compilation. Requires the rustfmt component (mise.toml pins it).'
    command: 'cargo fmt --all --check'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-lint-py:
    description: 'Python lint + format gate — ruff check + ruff format --check on packages/python/python (pinned ruff==0.15.12, matching the codegen dep-group). No compile.'
    command: 'bash scripts/ci/check-lint-py.sh'
    options:
      runFromWorkspaceRoot: true
      cache: false

  check-clippy:
    description: 'Rust lint gate — cargo clippy --workspace --all-targets -- -D warnings. COMPILES (not a pr-gate cheap check); needs Python 3.12 on the runner for the pyo3 abi3-py312 crate. Default features only (NOT --all-features: that enables pyo3/extension-module, which breaks the non-extension link that cargo build/test uses).'
    command: 'cargo clippy --workspace --all-targets --locked -- -D warnings'
    options:
      runFromWorkspaceRoot: true
      cache: false
