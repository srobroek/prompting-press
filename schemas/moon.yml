# schemas/moon.yml
# Moon project for the JSON Schema artefacts and their validation tasks.
# This is NOT a Rust crate — language is set to 'unknown' so moon does not
# attempt Cargo integration. The tasks use ephemeral uv deps (no committed venv).
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'unknown'

# Do not inherit the global all.yml tasks (build/test use `cargo …` which
# is wrong for this project). Override with explicit task list only.
tasks:
  check-schema:
    description: 'T016 — Assert prompt-definition.schema.json is a valid Draft 2020-12 document (FR-008).'
    command: 'uv run --with jsonschema python3 jsonschema/scripts/meta_validate.py'
    inputs:
      - 'jsonschema/prompt-definition.schema.json'
      - 'jsonschema/scripts/meta_validate.py'

  validate-fixtures:
    description: 'T019 — Validate all fixtures/valid/ accept and fixtures/invalid/ reject (FR-013 / US2 gate).'
    command: 'uv run --with jsonschema python3 jsonschema/scripts/validate_fixtures.py'
    deps:
      - 'check-schema'
    inputs:
      - 'jsonschema/prompt-definition.schema.json'
      - 'jsonschema/scripts/validate_fixtures.py'
      - 'jsonschema/fixtures/**/*'
