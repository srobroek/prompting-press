# deny.toml — cargo-deny configuration for Prompting Press
# T036 / SEC-001: dependency-advisory security gate.
#
# PRIMARY PURPOSE: catch known CVEs in workspace dependencies before they land.
# License and bans sections are kept deliberately permissive so the advisory gate
# does not turn into a license-policy fight on day one. Tighten them deliberately
# when you have a policy, not before.
#
# ROADMAP-Q3 NOTE (minijinja bump obligation):
#   Whenever minijinja is bumped in Cargo.toml, the bumping author MUST re-confirm
#   that Template::undeclared_variables (nested=false) remains a stable, public API
#   in the new release. This is the "re-confirm MiniJinja stable-API on each bump"
#   obligation recorded in the roadmap Open Question Q3. The advisory gate owner
#   also owns this re-check. Procedure:
#     1. Run `cargo deny check advisories` — must be green after the bump.
#     2. Check the minijinja CHANGELOG for any deprecation of undeclared_variables.
#     3. Run `mise exec -- moon run ci:check-advisories` locally before pushing.

[graph]
# Only scan workspace crates and their transitive deps.
targets = []

# ---------------------------------------------------------------------------
# [advisories] — PRIMARY GATE (SEC-001)
#
# cargo-deny v2 schema: vulnerability/unsound/notice/severity-threshold fields
# are REMOVED. All CVE-tagged advisories in the RustSec DB are denied by default
# unless explicitly listed in `ignore`. Use `ignore` (with a written reason) to
# suppress a specific advisory after a deliberate security review.
#
# `unmaintained` and `unsound` now take a scope value, not a lint level:
#   "all"        — flag all matching crates (workspace + transitive)
#   "workspace"  — flag only workspace-member crates
#   "transitive" — flag only transitive deps
#   "none"       — do not flag
#
# `yanked` still takes a lint level: "deny" | "warn" | "allow"
# ---------------------------------------------------------------------------
[advisories]
version = 2

# Flag unmaintained crates across the full dep graph. "all" = workspace + transitive.
# This is a warning posture on day one; flip to a hard deny by adding the advisory
# ID to a `deny` list once the dep tree has been triaged.
unmaintained = "all"

# Flag unsound crates (declared unsound by the crate's own authors) across full graph.
unsound = "all"

# Deny yanked crate versions — a yanked version signals a known-broken release.
yanked = "deny"

# Advisories to suppress — add an entry here only after a documented security review.
# Example:
#   ignore = [{ id = "RUSTSEC-2023-XXXX", reason = "not reachable via our usage" }]
ignore = []

# ---------------------------------------------------------------------------
# [licenses] — POLICY GATE (Apache-2.0 release compatibility)
# ---------------------------------------------------------------------------
# This is now an ENFORCING gate (wired as ci:check-licenses / the PR gate), not
# the day-one permissive placeholder. The whole workspace is published under
# Apache-2.0 (see the root LICENSE + `license = "Apache-2.0"` in Cargo.toml), so
# every dependency's license MUST be Apache-2.0-compatible: permissive, or a
# multi-license (`OR`) expression with at least one permissive arm cargo-deny can
# elect. No strong copyleft (GPL/AGPL/LGPL-as-sole-license) is permitted.
#
# The allow-list below is DELIBERATELY MINIMAL — it lists exactly the SPDX ids
# that actually resolve in the current dependency graph (verified via
# `cargo deny check licenses` on the committed Cargo.lock). Adding a new dep that
# pulls in a license outside this set is a HARD FAILURE by design: triage it and
# either (a) add the license here with a written rationale if it is
# Apache-2.0-compatible, or (b) remove/replace the dependency.
#
# Attribution obligation: MIT/BSD/ISC/Apache-2.0 all require preserving upstream
# copyright + license notices in BINARY distributions. The Python wheel (maturin)
# and the npm .node addon statically link this Rust graph, so their bundled
# THIRD-PARTY-LICENSES.md files (regenerated by cargo-about, guarded by
# ci:check-third-party-licenses) carry those notices. See NOTICE at the repo root.
[licenses]
version = 2
# Unpublished workspace members (`publish = false`, e.g. the samples/rust/* consumer
# apps) carry no license field on purpose — they are never distributed. Ignore them
# so the gate only judges the crates we actually ship + their transitive deps.
private = { ignore = true }
# Each entry below is present (as a sole license or an OR-arm) in the resolved
# graph. Keep this list sorted and pruned to what is actually used — an unmatched
# entry is a warning that signals the list has drifted from the tree.
allow = [
  "Apache-2.0",                     # minijinja, memo-map (sole); + OR-arm of most crates
  "Apache-2.0 WITH LLVM-exception", # target-lexicon (pyo3 build dep, sole); rustix/wasip2 OR-arm
  "MIT",                            # napi*, pythonize, serde_yaml_ng, winnow, zmij, … (sole)
  "ISC",                            # libloading (sole)
  "Unicode-3.0",                    # unicode-ident — "(MIT OR Apache-2.0) AND Unicode-3.0"
]
# For multi-license (`OR`) crates cargo-deny passes as long as ONE arm is allowed
# (e.g. ryu = "Apache-2.0 OR BSL-1.0" -> Apache-2.0; memchr = "Unlicense OR MIT"
# -> MIT). No per-crate [[licenses.exceptions]] are needed today — the allow-list
# above covers the full graph. Add exceptions only after a documented review.
confidence-threshold = 0.9

# ---------------------------------------------------------------------------
# [bans] — PERMISSIVE (not a policy gate in v1)
# ---------------------------------------------------------------------------
# TODO(post-v1): add specific crates to deny if security policy requires it.
[bans]
# Warn on multiple versions of the same crate rather than failing.
multiple-versions = "warn"
deny = []

# ---------------------------------------------------------------------------
# [sources] — only crates.io in v1
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
