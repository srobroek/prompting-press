# Published Python package: a thin wrapper around the PyO3 binding crate
# `crates/prompting-press-py/` (a cdylib). Built with maturin.
#
# SKELETON ONLY (spec 001 / FR-004): this wires the build backend and points it
# at the binding crate. No runtime logic ships here — the importable module is
# the compiled Rust extension, materialized once the crate (US1) and codegen
# (US3) land. Until then there is nothing to publish (version 0.0.0).

[build-system]
# maturin is the PyO3 packaging standard (research D1). The `>=1.14,<2.0`
# bound is the conventional, recommended form for build-system requires and is
# acceptable under the no-floating-versions rule (SEC-003), which targets the
# `^`/`~`/`"latest"`/`"*"` shorthands — not explicit bounded ranges. maturin is
# intentionally NOT pinned in mise.toml (removed per security finding H-2); it is
# resolved by uv / the build backend from this bound when the wheel is built
# (spec 004/007). No maturin build runs in spec 001.
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
# `prompting-press` is the PyPI distribution name. The importable module is
# `prompting_press` (see [tool.maturin].module-name).
name = "prompting-press"
version = "0.2.0" # pre-release: nothing is published in spec 001
description = "Python distribution of Prompting Press — a thin wrapper around the Rust core via PyO3."
readme = "README.md"
# Pydantic v2 target floor (US3 generates Pydantic v2 models). Decoupled from the
# repo's pinned dev runtime (mise.toml python = 3.14.4) on purpose: the published
# wheel must support the broader supported-Python range, not just the dev pin.
# Floor raised 3.10 -> 3.12 in spec 008 (pre-publish): 3.10 nears EOL, 3.12 is the
# CI-tested interpreter, and 3.12 gives stdlib `tomllib` for Prompt.from_toml (no
# tomli backport dependency).
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Sjors Robroek" }]
# Pydantic v2 is the typed-Vars facade and the generated shape (US3). The bounded
# range `>=2,<3` is explicit and acceptable under the no-floating-versions rule.
dependencies = ["pydantic>=2,<3"]
keywords = ["prompt", "prompting", "prompt-template", "prompt-engineering", "llm", "genai", "ai", "template", "pydantic", "typed"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Rust",
  "Topic :: Software Development :: Libraries",
  "Topic :: Text Processing :: General",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://prompting-press.github.io/"
Documentation = "https://prompting-press.github.io/"
Repository = "https://github.com/prompting-press/prompting-press"
Issues = "https://github.com/prompting-press/prompting-press/issues"

[dependency-groups]
# Build-time-only codegen toolchain (NOT a wheel runtime dep — runtime
# `dependencies` above stays empty). PEP 735 dependency-group; locked with
# integrity hashes in uv.lock, which is the SEC-001/002 supply-chain pin.
# This is the single source of truth for datamodel-code-generator version.
# To upgrade: edit the specifier here, then run `uv lock --project packages/python`.
# CI install: `uv sync --project packages/python --group codegen --no-install-project --frozen`
# (then run packages/python/scripts/codegen.sh).
codegen = ["datamodel-code-generator==0.66.0", "ruff==0.15.20"]

# Property-based / adversarial fuzzing framework (spec 009 T008 — test-only;
# MUST NOT enter the published wheel's runtime `[project.dependencies]`).
# Exact pin per FR-009 / SEC-003 (no floating ranges in dev deps).
# To lock after editing: `uv lock --project packages/python`.
test = ["hypothesis==6.155.7"]

[tool.maturin]
# The binding crate lives OUTSIDE this package dir, at the repo's
# `crates/prompting-press-py/` (workspace member). Reference it explicitly.
# NOTE: this path is materialized by US1 (crate stubs, tasks T005–T008); this
# skeleton task (T009) is [P] and intentionally lands before the crate exists.
manifest-path = "../../crates/prompting-press-py/Cargo.toml"
# The importable Python module name (distinct from the PyPI dist name above).
module-name = "prompting_press"
# Build as a CPython extension module (the PyO3 standard for embeddable wheels).
features = ["pyo3/extension-module"]
# Mixed Rust/Python layout: Python-side sources live under `python/`, so the
# compiled extension and any future generated Python (US3 Pydantic models) share
# one importable package. See `python/prompting_press/__init__.py`.
python-source = "python"
# Ship the license + attribution files INSIDE the wheel and sdist. The wheel
# statically links the Rust dependency graph, so the MIT/BSD/ISC/Apache-2.0
# attribution notices must travel with the binary (THIRD-PARTY-LICENSES.md,
# generated by cargo-about + guarded by ci:check-third-party-licenses). LICENSE
# and NOTICE are symlinked from the repo root into this package dir so maturin can
# include them (paths are relative to pyproject.toml).
include = [
  { path = "THIRD-PARTY-LICENSES.md", format = ["sdist", "wheel"] },
  { path = "LICENSE", format = ["sdist", "wheel"] },
  { path = "NOTICE", format = ["sdist", "wheel"] },
]

# Ruff config — makes the lint/format policy explicit (was pure defaults before).
# Drives ci:check-lint-py (ruff check + ruff format --check) and the codegen
# ruff-format pass. The tree is already clean under these settings — this codifies
# current behavior + a modest extended rule set, not a re-format.
[tool.ruff]
# 100 cols, matching biome.json (TS) + rustfmt.toml (Rust) for cross-language
# consistency. (Ruff's own default is 88.) datamodel-code-generator's ruff-format
# pass reads this too, so the generated shape is now formatted at 100 as well —
# one width across the whole repo, codegen included.
line-length = 100
# Honor `exclude` even when a path is passed explicitly on the command line (how
# editor/commit hooks invoke ruff, e.g. `ruff check <changed-file>`). Without this,
# ruff's `exclude` only filters directory-walk discovery, so a hook passing the
# generated file's path would lint it anyway and flag codegen's long docstrings.
force-exclude = true

[tool.ruff.lint]
# Default (E4/E7/E9, F) plus: import sorting (I), pyflakes-warns (W), bugbear (B),
# flake8-simplify (SIM), pyupgrade (UP), pep8-naming (N), comprehensions (C4), and
# Ruff's own rules (RUF, incl. RUF022 sorted __all__). Verified clean on the
# hand-written facade.
select = ["E", "F", "W", "I", "B", "SIM", "UP", "N", "C4", "RUF"]
# The generated Pydantic shape is owned by the codegen pipeline (its structure —
# import order, __all__, naming — is datamodel-code-generator's, not ours, and the
# codegen freshness gate guards it byte-for-byte). Exclude it from LINT rules only;
# it is still FORMAT-checked (and now formatted at 100, consistent with the rest).
exclude = ["python/prompting_press/generated/**"]
