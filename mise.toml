[tools]
# All tools pinned to concrete versions — no floating ("latest"/"^"/"~"/"*") per SEC-003 (T030a).
# Versions reflect the toolchain resolved on 2026-06-25; bump deliberately, never float.
# mise is the single source of truth for tool versions in this repo.

# --- Runtimes ---
node = "25.3.0"
python = "3.14.4"
go = "1.26.2"          # reserved for spec 006 (Go binding); packages/go stays toolchain-free in 001 (FR-005)
uv = "0.11.8"
# rustc/cargo/rustfmt are components of ONE rustup toolchain. mise drives rustup
# (sets RUSTUP_TOOLCHAIN), so this pin must exist in-repo: RUSTUP_TOOLCHAIN overrides
# rust-toolchain.toml in rustup precedence, so omitting it lets the global mise rust
# version silently shadow the rust-toolchain.toml that T002 creates. Keep the two in lockstep.
# `components` MUST be listed here: mise does NOT honor rust-toolchain.toml's components,
# so without this a clean CI runner installs a bare toolchain and `:codegen`'s rustfmt
# step fails ("rustfmt is not installed for 1.95.0"). Lockstep with rust-toolchain.toml.
rust = { version = "1.95.0", components = "rustfmt,clippy" }

# --- Package managers / orchestration ---
"npm:@moonrepo/cli" = "2.2.3"   # moon
"npm:pnpm" = "10.33.2"          # pnpm (TS workspace); install with `mise exec` / `corepack` off
jq = "1.8.1"

# --- Codegen toolchain (research D1) ---
"cargo:cargo-typify" = { version = "0.7.0", locked = true }  # Rust JSON-Schema -> serde structs (T022/T025); --locked pins transitive deps to cargo-typify's shipped Cargo.lock

# --- Security toolchain (T036 / SEC-001) ---
"cargo:cargo-deny" = { version = "0.19.9", locked = true }   # Advisory scan (ci:check-advisories) + license gate (ci:check-licenses); reads deny.toml
# License-attribution generator: renders the bundled THIRD-PARTY-LICENSES.md files
# for the Python wheel + npm addon (Rust graph is statically linked). Drives
# ci:check-third-party-licenses. --locked pins its own transitive deps.
# `features = ["cli"]` is REQUIRED: cargo-about >=0.8 gates its binary behind the
# `cli` feature, so a bare install builds no `cargo-about` binary.
"cargo:cargo-about" = { version = "0.9.1", locked = true, features = ["cli"] }
# NOTE (pip-audit / pip-licenses): the Python advisory + license gates pin their
# tools inline via `uv run --with pip-audit==2.9.0` / `--with pip-licenses==5.5.5`
# (exact versions, invisible to the SEC-003 floating-version gate). They are NOT
# declared here because uv resolves them per-invocation into an ephemeral env.
# datamodel-code-generator is managed via uv (packages/python/uv.lock, dependency-group codegen) — not pipx.
# maturin is declared as a build-system requires in packages/python/pyproject.toml (>=1.14,<2.0);
# the wheel build (spec 004/007) will resolve it via uv/build-system at that time.
# Neither tool needs a pipx pin here; removing both eliminates the H-2 redundant/unverified mechanism.

# --- Docs extraction toolchain (spec 011) ---
# A SECOND, SEPARATE nightly toolchain used ONLY by docs/site/scripts/extract-rust-api.mjs
# for `rustdoc -Z unstable-options --output-format json`. It does NOT replace the stable
# 1.95.0 pin above; the extractor calls it explicitly via `cargo +nightly-2026-05-15`.
# Pinned in rust-toolchain-nightly.toml; recorded here so `mise install` provisions it.
# DELIBERATE-UPGRADE: bump only after verifying the new date + format_version per
# rust-toolchain-nightly.toml's upgrade contract.
# rust-nightly = "nightly-2026-05-15"   # uncomment if mise gains rustup-channel support

