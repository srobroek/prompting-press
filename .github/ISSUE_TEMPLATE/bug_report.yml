name: Bug report
description: Something is broken — wrong output, panic, error, or unexpected behaviour.
title: "fix: "
labels: [bug]
body:
  - type: dropdown
    id: binding
    attributes:
      label: Affected binding / area
      options:
        - Rust (prompting-press)
        - Python (prompting-press-py)
        - TypeScript (prompting-press-node)
        - Docs site
        - Build / CI
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Crate version, PyPI version, or npm version — whichever is relevant.
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Paste the prompt definition (YAML/JSON or inline struct) **and** the smallest
        code snippet that triggers the issue. The smaller, the faster we can help.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full error message or wrong output.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, language runtime version, toolchain.
      placeholder: |
        OS: macOS 15 / Ubuntu 24.04 / Windows 11
        Rust: 1.87 (stable)   # or Python 3.12 / Node 22
        Architecture: arm64 / x86_64
    validations:
      required: false
