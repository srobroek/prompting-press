# CodeQL static analysis across the repo's three languages.
#
# Languages: Rust (crates/), Python (packages/python), JavaScript/TypeScript
# (packages/typescript + docs/site). Each runs in its own matrix leg so a
# parse/extraction issue in one language does not mask the others.
#
# The `Analyze (<lang>)` job names are the status checks to require in branch
# protection on `main`.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run CodeQL inside the merge queue too, so it can be a required check there.
  # Without this trigger the queue would hang waiting for a check that never runs.
  merge_group:
  schedule:
    # Weekly full scan (Mondays 07:00 UTC) so advisories surface even without a push.
    - cron: "0 7 * * 1"

# Cancel superseded runs on the same ref — EXCEPT in the merge queue, where the
# same ephemeral queue branch can be re-triggered and a cancelled run would fail
# the required Analyze (*) checks and eject the PR (same hazard fixed in ci.yml).
# For merge_group: unique group per run + no cancellation; otherwise ref-keyed.
concurrency:
  group: codeql-${{ github.ref }}-${{ github.event_name == 'merge_group' && github.run_id || '' }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload CodeQL results to the Security tab
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # All three use build-mode `none` (buildless extraction). Rust CodeQL does
        # NOT support `autobuild` ("Rust does not support the autobuild build mode")
        # and buildless extraction is the supported mode; Python and JS/TS are
        # buildless by nature.
        include:
          - language: rust
            build-mode: none
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          category: "/language:${{ matrix.language }}"
          # Do NOT upload SARIF on merge_group runs. The merge queue builds on an
          # ephemeral ref (refs/heads/gh-readonly-queue/…) that no longer exists by
          # the time CodeQL uploads, so the upload fails with "ref not found →
          # configuration error", failing this REQUIRED queue check and ejecting the
          # PR (even though the analysis itself passed). The analysis still runs here
          # to satisfy the required `Analyze (*)` check; results are uploaded to the
          # Security tab on the push/pull_request/schedule runs, which have real refs.
          upload: ${{ github.event_name == 'merge_group' && 'never' || 'always' }}
