# CodeQL static analysis across the repo's three languages.
#
# Languages: Rust (crates/), Python (packages/python), JavaScript/TypeScript
# (packages/typescript + docs/site). Each runs in its own matrix leg so a
# parse/extraction issue in one language does not mask the others.
#
# The `Analyze (<lang>)` job names are the status checks to require in branch
# protection on `main`.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 07:00 UTC) so advisories surface even without a push.
    - cron: "0 7 * * 1"

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload CodeQL results to the Security tab
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # All three use build-mode `none` (buildless extraction). Rust CodeQL does
        # NOT support `autobuild` ("Rust does not support the autobuild build mode")
        # and buildless extraction is the supported mode; Python and JS/TS are
        # buildless by nature.
        include:
          - language: rust
            build-mode: none
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
