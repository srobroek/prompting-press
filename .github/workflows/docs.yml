name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "schemas/jsonschema/prompt-definition.schema.json"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/site/**"
      - "schemas/jsonschema/prompt-definition.schema.json"
      - ".github/workflows/docs.yml"

# Allow one deploy at a time; cancel in-progress deploys on new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: "10.11.0"

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22.12.0"
          cache: pnpm
          cache-dependency-path: docs/site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C docs/site install --frozen-lockfile

      - name: Build
        run: pnpm -C docs/site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: docs/site/dist

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only on push to main, not on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
