      #   run: cargo publish -p prompting-press-core && cargo publish -p prompting-press
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # --- Python (PyPI via maturin) ---
      # - name: Publish Python wheel
      #   run: maturin publish --manifest-path crates/prompting-press-py/Cargo.toml
      #   env:
      #     MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}

      # --- TypeScript (npm via pnpm) ---
