exclude: '^(\.specify/|specs/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
        # tsconfig*.json are JSONC (TypeScript reads // comments by design — the
        # scaffold's tsconfig has shipped comments since spec 001). check-json is a
        # strict JSON parser and rejects them, so exclude them here. tsc itself is the
        # real validator for these files (the typecheck gate).
        exclude: 'tsconfig[^/]*\.json$'
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos
        args: [--force-exclude]

  - repo: https://github.com/alexander-bauer/cocogitto-pre-commit
    rev: v0.1.0
    hooks:
      - id: cocogitto-verify
        stages: [commit-msg]
