mcp_configs:
  codebase-memory-mcp:
    name: codebase-memory-mcp
    transport: stdio
    registry: false
    command: codebase-memory-mcp
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp'
    registry: false
    command: npx
  mcp-package-version:
    name: mcp-package-version
    transport: stdio
    args:
    - -y
    - mcp-package-version
    registry: false
    command: npx
  repomix:
    name: repomix
    transport: stdio
    args:
    - -y
    - repomix
    - --mcp
    registry: false
    command: npx
  serena:
    name: serena
    transport: stdio
    args:
    - -lc
    - ctx="${SERENA_MCP_CONTEXT:-}"; if [ -z "$ctx" ]; then parent="$(ps -o args=
      -p "$PPID" 2>/dev/null | tr "[:upper:]" "[:lower:]")"; case "$parent" in *claude*)
      ctx="claude-code" ;; *codex*) ctx="codex" ;; *) ctx="agent" ;; esac; fi; exec
      serena start-mcp-server --context "$ctx" --project-from-cwd
    registry: false
    command: bash
